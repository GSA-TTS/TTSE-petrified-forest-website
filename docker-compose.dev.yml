version: '3.8'

services:
  app:
    build:
      target: development
    ports:
      - '5173:5173'
    volumes:
      - .:/app:cached
      - node_modules:/app/node_modules:delegated
    environment:
      - NODE_ENV=development
      - VITE_PORT=5173
      - VITE_HOST=0.0.0.0
    command: sh -c "npm install && chown -R node:node /app/node_modules && su node -c 'npm run dev -- --host 0.0.0.0 --port 5173'"
    stdin_open: true
    tty: true
    user: root
